<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #d7dde7;
      --border-strong: #c7d0dd;
      --button-hover: #f8fafc;
      --button-tonal: #f3f6fa;
      --button-tonal-hover: #edf2f7;
      --primary: #1f2937;
      --primary-hover: #111827;
      --status-bg: #f3f4f6;
      --status-border: #d1d5db;
    }

    * {
      box-sizing: border-box;
    }

    body {
      width: 348px;
      margin: 0;
      padding: 10px;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .header {
      margin-bottom: 8px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--card);
    }

    .title {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .subtitle {
      margin: 4px 0 0;
      font-size: 10px;
      color: var(--muted);
    }

    .card {
      margin-bottom: 8px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--card);
    }

    .action-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      width: 100%;
      min-height: 44px;
      padding: 8px 32px 8px 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #ffffff;
      color: var(--text);
      font-size: 12px;
      font-weight: 600;
      line-height: 1.15;
      text-align: left;
      cursor: pointer;
      transition: background 0.12s ease, border-color 0.12s ease;
    }

    .btn:hover {
      background: var(--button-hover);
      border-color: var(--border-strong);
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: wait;
    }

    .btn:focus-visible {
      outline: 2px solid #94a3b8;
      outline-offset: 1px;
    }

    .btn-primary {
      background: var(--primary);
      color: #ffffff;
      border-color: var(--primary);
    }

    .btn-primary:hover {
      background: var(--primary-hover);
      border-color: var(--primary-hover);
    }

    .btn-tonal {
      background: var(--button-tonal);
    }

    .btn-tonal:hover {
      background: var(--button-tonal-hover);
    }

    .btn-full {
      grid-column: 1 / -1;
      justify-content: center;
      padding-right: 10px;
      text-align: center;
    }

    .btn-span-2 {
      grid-column: span 2;
    }

    .btn-copy {
      display: flex;
      align-items: center;
      min-width: 0;
    }

    .btn-label {
      display: block;
      font-size: 10.5px;
      font-weight: 700;
      word-break: break-word;
    }

    .btn-detail {
      display: none;
    }

    .shortcut {
      position: absolute;
      top: 6px;
      right: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 18px;
      padding: 0 5px;
      border: 1px solid var(--border-strong);
      border-radius: 999px;
      background: #f8fafc;
      color: #475569;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .btn-primary .shortcut {
      background: #ffffff;
      color: #334155;
      border-color: #e5e7eb;
    }

    .status {
      margin: 0;
      padding: 7px 9px;
      border: 1px solid var(--status-border);
      border-radius: 10px;
      background: var(--status-bg);
      color: #374151;
      font-size: 10px;
      line-height: 1.3;
      white-space: pre-line;
    }

    .status[hidden] {
      display: none;
    }

    .status-compact {
      margin-top: 8px;
    }

    .status-stack {
      display: grid;
      gap: 6px;
      margin-top: 8px;
    }

    .details {
      margin-bottom: 8px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--card);
      overflow: hidden;
    }

    .details summary {
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px;
      cursor: pointer;
      user-select: none;
    }

    .details summary::-webkit-details-marker {
      display: none;
    }

    .details[open] summary {
      border-bottom: 1px solid var(--border);
      background: #fafbfc;
    }

    .summary-copy {
      display: flex;
      align-items: center;
      min-width: 0;
    }

    .summary-title {
      font-size: 11px;
      font-weight: 700;
    }

    .summary-shortcuts {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 18px;
      padding: 0 6px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #f8fafc;
      color: var(--muted);
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .details-content {
      padding: 10px;
    }

    .advanced-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .advanced-grid .btn {
      min-height: 40px;
      font-size: 11px;
    }

    .dispatch-input {
      width: 100%;
      margin-bottom: 8px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #ffffff;
      color: var(--text);
      font-size: 11px;
    }

    .dispatch-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .dispatch-actions .btn {
      flex: 1 1 0;
      justify-content: center;
      padding-right: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <p class="title">Iskra</p>
    <p class="subtitle">1-0, Z, N/L/R/C/E/H, Esc</p>
  </div>

  <div class="card">
    <div class="action-grid">
      <button
        class="btn btn-primary btn-span-2"
        id="runBtn"
        data-shortcut-key="2"
        data-shortcut-detail="Start dla aktywnej karty lub wybranych tabow"
      >
        <span class="btn-copy">
          <span class="btn-label">Uruchom</span>
        </span>
        <span class="shortcut">2</span>
      </button>

      <button
        class="btn btn-tonal"
        id="runRemoteBtn"
        data-shortcut-key="Z"
        data-shortcut-detail="Start zdalny przez Remote Runner"
      >
        <span class="btn-copy">
          <span class="btn-label">Zdalnie</span>
        </span>
        <span class="shortcut">Z</span>
      </button>

      <button
        class="btn"
        id="manualSourceBtn"
        data-shortcut-key="1"
        data-shortcut-detail="Wklej tekst lub podepnij PDF jako zrodlo"
      >
        <span class="btn-copy">
          <span class="btn-label">Wklej</span>
        </span>
        <span class="shortcut">1</span>
      </button>

      <button
        class="btn btn-tonal"
        id="resumeStageBtn"
        title="Aktywna karta: wykryj ostatni etap i wznow od poprawnego promptu"
        data-shortcut-key="3"
        data-shortcut-detail="Aktywna karta ChatGPT: wykryj etap i kontynuuj"
      >
        <span class="btn-copy">
          <span class="btn-label">Wznow etap</span>
        </span>
        <span class="shortcut">3</span>
      </button>

      <button
        class="btn btn-tonal"
        id="resumeAllBtn"
        title="Aktywne procesy company (INVEST): stop, reload, detekcja etapu i start od poprawnego promptu"
        data-shortcut-key="4"
        data-shortcut-detail="Masowy reload, detekcja etapu i start od poprawnego promptu"
      >
        <span class="btn-copy">
          <span class="btn-label">Wznow wszystko</span>
        </span>
        <span class="shortcut">4</span>
      </button>

      <button
        class="btn"
        id="copyYouTubeTranscriptBtn"
        data-shortcut-key="8"
        data-shortcut-detail="Skopiuj transkrypt z aktywnego filmu"
      >
        <span class="btn-copy">
          <span class="btn-label">Kopiuj YT</span>
        </span>
        <span class="shortcut">8</span>
      </button>

      <button
        class="btn"
        id="responsesBtn"
        data-shortcut-key="5"
        data-shortcut-detail="Lokalne odpowiedzi, kopiowanie i przeglad historii"
      >
        <span class="btn-copy">
          <span class="btn-label">Wyniki</span>
        </span>
        <span class="shortcut">5</span>
      </button>

      <button
        class="btn"
        id="decisionPanelBtn"
        data-shortcut-key="6"
        data-shortcut-detail="Aktywne procesy, decyzje i biezace statusy"
      >
        <span class="btn-copy">
          <span class="btn-label">Procesy</span>
        </span>
        <span class="shortcut">6</span>
      </button>

      <button
        class="btn"
        id="problemLogsBtn"
        data-shortcut-key="L"
        data-shortcut-detail="Diagnostyka runtime, timeoutow i bledow procesow"
      >
        <span class="btn-copy">
          <span class="btn-label">Logi</span>
        </span>
        <span class="shortcut">L</span>
      </button>

      <button
        class="btn btn-tonal"
        id="restoreProcessWindowsBtn"
        title="Przywroc i sfokusuj istniejace okna procesow bez restartu prompt chaina"
        data-shortcut-key="9"
        data-shortcut-detail="Przywroc istniejace okna procesow bez restartu"
      >
        <span class="btn-copy">
          <span class="btn-label">Okna</span>
        </span>
        <span class="shortcut">9</span>
      </button>

      <button
        class="btn btn-tonal"
        id="autoRestoreToggleBtn"
        title="Co 5 minut: restore okien, health check i opcjonalny reload+resume"
        data-shortcut-key="0"
        data-shortcut-detail="Co 5 min: restore okien, health check i reload+resume"
      >
        <span class="btn-copy">
          <span class="btn-label">Auto ON</span>
        </span>
        <span class="shortcut">0</span>
      </button>

      <button
        class="btn btn-tonal"
        id="unfinishedProcessesBtn"
        data-shortcut-key="N"
        data-shortcut-detail="Batch recovery dla zapisanych niedokonczonych procesow"
      >
        <span class="btn-copy">
          <span class="btn-label">Przerwane</span>
        </span>
        <span class="shortcut">N</span>
      </button>

      <button
        class="btn btn-full"
        id="stopBtn"
        data-shortcut-key="7"
        data-shortcut-detail="Przerwij tylko proces przypiety do aktywnego okna"
      >
        <span class="btn-copy">
          <span class="btn-label">Przerwij</span>
        </span>
        <span class="shortcut">7</span>
      </button>
    </div>

    <p class="status status-compact" id="runStatus" aria-live="polite" hidden></p>

    <div class="status-stack">
      <p class="status" id="restoreProcessWindowsStatus" aria-live="polite" hidden></p>
      <p class="status" id="autoRestoreStatus" aria-live="polite" hidden></p>
    </div>
  </div>

  <details class="details">
    <summary>
      <span class="summary-copy">
        <span class="summary-title">Zaawansowane</span>
      </span>
      <span class="summary-shortcuts">R C E H</span>
    </summary>
    <div class="details-content">
      <div class="advanced-grid">
        <button
          class="btn"
          id="repeatLastPromptAllBtn"
          data-shortcut-key="R"
          data-shortcut-detail="Powtorz ostatni prompt we wszystkich aktywnych procesach"
        >
          <span class="btn-copy">
            <span class="btn-label">Powtorz prompt</span>
          </span>
          <span class="shortcut">R</span>
        </button>

        <button
          class="btn"
          id="countCompanyMessagesBtn"
          data-shortcut-key="C"
          data-shortcut-detail="Policz komplet wiadomosci na aktywnej konwersacji company"
        >
          <span class="btn-copy">
            <span class="btn-label">Policz</span>
          </span>
          <span class="shortcut">C</span>
        </button>

        <button
          class="btn btn-tonal"
          id="resumeAllExtendedBtn"
          data-shortcut-key="E"
          data-shortcut-detail="Reload + wznowienie z composer thinking effort: extended"
        >
          <span class="btn-copy">
            <span class="btn-label">Extended</span>
          </span>
          <span class="shortcut">E</span>
        </button>

        <button
          class="btn btn-tonal"
          id="resumeAllHeavyBtn"
          data-shortcut-key="H"
          data-shortcut-detail="Reload + wznowienie z composer thinking effort: heavy"
        >
          <span class="btn-copy">
            <span class="btn-label">Heavy</span>
          </span>
          <span class="shortcut">H</span>
        </button>
      </div>
    </div>
  </details>

  <details class="details">
    <summary>
      <span class="summary-copy">
        <span class="summary-title">Watchlist</span>
      </span>
    </summary>
    <div class="details-content">
      <p class="status" id="watchlistCredentialsHint" aria-live="polite" hidden></p>
      <div id="watchlistCredentialsForm">
        <input
          class="dispatch-input"
          id="watchlistIntakeUrlInput"
          type="url"
          placeholder="Intake URL (https://...)"
          autocomplete="off"
        />
        <input
          class="dispatch-input"
          id="watchlistKeyIdInput"
          type="text"
          placeholder="Key ID"
          autocomplete="off"
        />
        <input
          class="dispatch-input"
          id="watchlistSecretInput"
          type="password"
          placeholder="Secret (HMAC)"
          autocomplete="off"
        />
        <div class="dispatch-actions">
          <button class="btn" id="saveWatchlistTokenBtn">Zapisz</button>
          <button class="btn" id="clearWatchlistTokenBtn">Wyczysc</button>
        </div>
      </div>
      <div class="dispatch-actions">
        <button class="btn btn-full" id="flushWatchlistDispatchBtn">Flush kolejki</button>
      </div>
      <p class="status" id="watchlistDispatchStatus" aria-live="polite">Sprawdzam status intake...</p>
    </div>
  </details>

  <details class="details">
    <summary>
      <span class="summary-copy">
        <span class="summary-title">Remote Runner</span>
      </span>
    </summary>
    <div class="details-content">
      <select class="dispatch-input" id="remoteRunnerTransportModeInput">
        <option value="watchlist">Transport: Watchlist API (HMAC)</option>
        <option value="local">Transport: Local relay (bez key)</option>
      </select>
      <input
        class="dispatch-input"
        id="remoteRunnerBaseUrlInput"
        type="url"
        placeholder="Relay URL local mode (np. http://127.0.0.1:8787)"
        autocomplete="off"
      />
      <input
        class="dispatch-input"
        id="remoteRunnerNameInput"
        type="text"
        placeholder="Nazwa tego runnera"
        autocomplete="off"
      />
      <div class="dispatch-actions">
        <button class="btn" id="remoteRunnerToggleBtn">Runner: OFF</button>
        <button class="btn" id="copySupportIdBtn">Kopiuj Runner ID</button>
      </div>
      <input
        class="dispatch-input"
        id="remoteTargetRunnerIdInput"
        type="text"
        placeholder="Runner ID drugiego komputera (opcjonalnie)"
        autocomplete="off"
      />
      <div class="dispatch-actions">
        <button class="btn btn-full" id="checkRemoteRunnerBtn">Sprawdz runner</button>
      </div>
      <p class="status" id="remoteRunnerStatus" aria-live="polite">Sprawdzam status runnera...</p>
      <p class="status" id="remoteRunnerJobStatus" aria-live="polite" hidden></p>
    </div>
  </details>

  <script src="popup.js"></script>
</body>
</html>
