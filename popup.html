<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --primary: #0f172a;
      --primary-hover: #020617;
      --danger: #b91c1c;
      --danger-hover: #991b1b;
      --status-bg: #f3f4f6;
      --status-border: #d1d5db;
      --shadow: 0 4px 16px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      width: 336px;
      margin: 0;
      padding: 12px;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .header {
      margin-bottom: 10px;
      padding: 8px 2px;
    }

    .title {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 4px 0 0;
      font-size: 12px;
      color: var(--muted);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      box-shadow: var(--shadow);
      margin-bottom: 10px;
    }

    .card-title {
      margin: 0 0 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .row:last-child {
      margin-bottom: 0;
    }

    .row-2 .btn {
      width: auto;
      flex: 1;
    }

    .btn {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 9px;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      background: #ffffff;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn:hover {
      background: #f8fafc;
      border-color: #94a3b8;
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: wait;
    }

    .btn-primary {
      background: var(--primary);
      color: #ffffff;
      border-color: var(--primary);
    }

    .btn-primary:hover {
      background: var(--primary-hover);
      border-color: var(--primary-hover);
    }

    .btn-danger {
      background: var(--danger);
      color: #ffffff;
      border-color: var(--danger);
      text-align: left;
    }

    .btn-danger:hover {
      background: var(--danger-hover);
      border-color: var(--danger-hover);
    }

    .btn-center {
      text-align: center;
    }

    .shortcut {
      float: right;
      font-size: 10px;
      color: #475569;
      font-weight: 700;
      border: 1px solid #cbd5e1;
      border-radius: 999px;
      padding: 1px 6px;
      background: #f8fafc;
    }

    .btn-primary .shortcut,
    .btn-danger .shortcut {
      color: #334155;
      border-color: #e2e8f0;
      background: #ffffff;
    }

    .status {
      margin: 0;
      padding: 8px 10px;
      border-radius: 9px;
      border: 1px solid var(--status-border);
      background: var(--status-bg);
      color: #374151;
      font-size: 11px;
      line-height: 1.35;
      white-space: pre-line;
    }

    .status[hidden] {
      display: none;
    }

    .status-compact {
      margin-bottom: 10px;
      font-size: 11px;
      padding: 7px 9px;
    }

    .details {
      margin-bottom: 10px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .details summary {
      list-style: none;
      cursor: pointer;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 700;
      color: #334155;
      border-bottom: 1px solid transparent;
      user-select: none;
    }

    .details[open] summary {
      border-bottom-color: var(--border);
      background: #f8fafc;
    }

    .details summary::-webkit-details-marker {
      display: none;
    }

    .details-content {
      padding: 10px;
    }

    .dispatch-input {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 9px;
      padding: 9px 10px;
      font-size: 12px;
      margin-bottom: 8px;
    }

    .dispatch-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <p class="title">Iskra</p>
    <p class="subtitle">Skroty: 1-0</p>
  </div>

  <div class="card">
    <p class="card-title">Analiza</p>
    <div class="row row-2">
      <button class="btn" id="manualSourceBtn">Wklej zrodlo <span class="shortcut">1</span></button>
      <button class="btn" id="copyYouTubeTranscriptBtn">Kopiuj YT <span class="shortcut">8</span></button>
    </div>
    <div class="row">
      <button class="btn btn-primary" id="runBtn">Uruchom analizy <span class="shortcut">2</span></button>
    </div>
    <div class="row row-2">
      <button class="btn" id="resumeStageBtn">Wznow (auto) <span class="shortcut">3</span></button>
      <button class="btn" id="resumeAllBtn">Reload + wznow wszystkie <span class="shortcut">4</span></button>
    </div>
  </div>

  <div class="card">
    <p class="card-title">Wyniki i kontrola</p>
    <div class="row row-2">
      <button class="btn" id="responsesBtn">Odpowiedzi <span class="shortcut">5</span></button>
      <button class="btn" id="decisionPanelBtn">Panel procesow <span class="shortcut">6</span></button>
    </div>
    <div class="row">
      <button class="btn" id="unfinishedProcessesBtn">Recovery niedokonczonych</button>
    </div>
    <div class="row">
      <button class="btn" id="problemLogsBtn">Logi problemow</button>
    </div>
    <div class="row">
      <button class="btn btn-danger" id="stopBtn">Przerwij w tym oknie <span class="shortcut">7</span></button>
    </div>
  </div>
  <p class="status status-compact" id="runStatus" aria-live="polite" hidden></p>

  <details class="details">
    <summary>Watchlist</summary>
    <div class="details-content">
      <p class="status" id="watchlistCredentialsHint" aria-live="polite" hidden></p>
      <div id="watchlistCredentialsForm">
        <input
          class="dispatch-input"
          id="watchlistIntakeUrlInput"
          type="url"
          placeholder="Intake URL (https://...)"
          autocomplete="off"
        />
        <input
          class="dispatch-input"
          id="watchlistKeyIdInput"
          type="text"
          placeholder="Key ID"
          autocomplete="off"
        />
        <input
          class="dispatch-input"
          id="watchlistSecretInput"
          type="password"
          placeholder="Secret (HMAC)"
          autocomplete="off"
        />
        <div class="dispatch-actions">
          <button class="btn btn-center" id="saveWatchlistTokenBtn">Zapisz dane</button>
          <button class="btn btn-center" id="clearWatchlistTokenBtn">Wyczysc</button>
        </div>
      </div>
      <div class="row"><button class="btn btn-center" id="flushWatchlistDispatchBtn">Wymus flush kolejki</button></div>
      <p class="status" id="watchlistDispatchStatus" aria-live="polite">Sprawdzam status intake...</p>
    </div>
  </details>

  <details class="details">
    <summary>Remote Runner</summary>
    <div class="details-content">
      <input
        class="dispatch-input"
        id="remoteRunnerNameInput"
        type="text"
        placeholder="Nazwa tego runnera"
        autocomplete="off"
      />
      <div class="dispatch-actions">
        <button class="btn btn-center" id="remoteRunnerToggleBtn">Runner: OFF</button>
        <button class="btn btn-center" id="copySupportIdBtn">Kopiuj Runner ID</button>
      </div>
      <input
        class="dispatch-input"
        id="remoteTargetRunnerIdInput"
        type="text"
        placeholder="Runner ID drugiego komputera"
        autocomplete="off"
      />
      <div class="dispatch-actions">
        <button class="btn btn-center" id="checkRemoteRunnerBtn">Sprawdz runner</button>
        <button class="btn btn-center" id="runRemoteBtn">Uruchom na drugim komputerze</button>
      </div>
      <p class="status" id="remoteRunnerStatus" aria-live="polite">Sprawdzam status runnera...</p>
      <p class="status" id="remoteRunnerJobStatus" aria-live="polite" hidden></p>
    </div>
  </details>

  <details class="details">
    <summary>Narzedzia</summary>
    <div class="details-content">
      <div class="row">
        <button class="btn btn-center" id="repeatLastPromptAllBtn">Powtorz ostatni prompt (wszystkie)</button>
      </div>
      <div class="row">
        <button class="btn btn-center" id="countCompanyMessagesBtn">Policz wszystkie wiadomosci (company)</button>
      </div>
      <div class="row row-2">
        <button class="btn btn-center" id="resumeAllExtendedBtn">Reload + wznow (extended)</button>
        <button class="btn btn-center" id="resumeAllHeavyBtn">Reload + wznow (heavy)</button>
      </div>
      <div class="row">
        <button class="btn btn-center" id="restoreProcessWindowsBtn">Przywroc okna procesow <span class="shortcut">9</span></button>
      </div>
      <div class="row">
        <button class="btn btn-center" id="autoRestoreToggleBtn">Auto co 5 min: ON <span class="shortcut">0</span></button>
      </div>
      <p class="status" id="restoreProcessWindowsStatus" aria-live="polite" hidden></p>
      <p class="status" id="autoRestoreStatus" aria-live="polite" hidden></p>
    </div>
  </details>

  <script src="popup.js"></script>
</body>
</html>
